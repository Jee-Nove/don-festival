<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faire un don — Grand Amour Festival</title>
  <meta name="description" content="Soutenez Les Ailes de Charlotte en faisant un don lors du Grand Amour Festival">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

  <div class="container">
    <header class="header">
      <img src="/images/logo-gaf.png" alt="Grand Amour Festival" class="logo">
      <div class="ladc-banner">
        <img src="/images/logo-ladc.png" alt="Les Ailes de Charlotte" class="logo-ladc">
        <div class="ladc-banner-text">
          <p class="ladc-title">Soutenez les projets des Ailes de Charlotte</p>
          <p class="ladc-subtitle">Fonds de dotation au service du handicap</p>
        </div>
      </div>
    </header>

    <div class="card">
      <p class="card__label">Choisissez un montant</p>

      <div class="amounts">
        <button class="amounts__btn active" data-amount="5">5 €</button>
        <button class="amounts__btn" data-amount="10">10 €</button>
        <button class="amounts__btn" data-amount="20">20 €</button>
        <button class="amounts__btn" data-amount="50">50 €</button>
      </div>

      <button class="amounts__btn" id="customToggle" style="width:100%;margin-bottom:14px;font-size:0.9rem;">Autre montant</button>

      <div class="custom-amount" id="customAmountWrapper" style="display:none;">
        <input
          type="number"
          id="customAmountInput"
          class="custom-amount__input"
          placeholder="Autre montant"
          min="1"
          max="1000"
          step="1"
          inputmode="decimal"
        >
        <span class="custom-amount__currency">€</span>
      </div>

      <div id="express-checkout-element"></div>
      <div class="separator">ou payer par carte</div>
      <div id="payment-element"></div>

      <button class="donate-btn" id="donateBtn" disabled>
        <span class="donate-btn__text">Donner 5 €</span>
        <span class="donate-btn__spinner"></span>
      </button>

      <div class="error-msg" id="errorMsg"></div>
    </div>

    <footer class="footer">
      <p class="footer__secure">🔒 Paiement sécurisé par Stripe</p>
      <p>Les Ailes de Charlotte — Grand Amour Festival 2026</p>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
